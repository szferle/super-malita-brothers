  <style>
    .proc-hero{background:var(--dark);color:#fff;padding:4.5rem 2.5rem 3.5rem;text-align:center;position:relative;overflow:hidden}
    .proc-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(92,122,58,0.22) 0%,transparent 65%);pointer-events:none}
    .proc-eye{display:inline-flex;align-items:center;gap:10px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-light);margin-bottom:1.5rem;font-weight:400}
    .proc-eye::before,.proc-eye::after{content:'';display:block;width:28px;height:0.5px;background:var(--gold)}
    .proc-hero h1{font-family:var(--serif);font-size:clamp(26px,5vw,48px);font-weight:300;color:#fff;margin-bottom:0}
    .proc-body{max-width:960px;margin:0 auto;padding:3.5rem 2.5rem 5rem;display:grid;grid-template-columns:1fr 1.4fr;gap:4rem;align-items:start}
    .proc-steps{display:flex;flex-direction:column;gap:0}
    .proc-step{display:flex;gap:1.25rem;align-items:flex-start;padding:1.5rem 0;border-bottom:0.5px solid var(--border)}
    .proc-step:last-of-type{border-bottom:none}
    .proc-step-icon{font-size:20px;width:44px;height:44px;background:var(--olive-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .proc-step-num{font-size:18px;letter-spacing:0.06em;color:var(--gold);font-weight:500;margin-bottom:4px;font-family:var(--serif)}
    .proc-step h3{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--olive);margin-bottom:3px}
    .proc-step p{font-size:15px;color:var(--text-muted);line-height:1.7}
    .proc-calc-box{margin-top:1.5rem;padding:1.25rem 1.5rem;background:var(--olive-pale);border-radius:var(--radius-lg);border-left:3px solid var(--olive)}
    .proc-calc-box p{font-size:14px;color:var(--text-muted);margin-bottom:0.75rem}
    .proc-calc-links{display:flex;gap:8px;flex-wrap:wrap}
    .proc-calc-link{background:var(--olive);color:#fff;text-decoration:none;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-family:var(--sans);transition:background 0.2s;display:inline-block}
    .proc-calc-link:hover{background:var(--olive-mid)}
    .proc-form-col h2{font-family:var(--serif);font-size:24px;font-weight:400;color:var(--olive);margin-bottom:1.25rem}
    .proc-form .form-group{margin-bottom:0.9rem}
    .proc-form .form-group label{display:block;font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:5px;font-weight:400}
    .proc-form input,.proc-form textarea{width:100%;padding:11px 14px;border:0.5px solid rgba(61,82,40,0.25);border-radius:var(--radius);background:var(--olive-mist);color:var(--text);font-size:15px;font-family:var(--sans);font-weight:300}
    .proc-form input:focus,.proc-form textarea:focus{outline:none;border-color:var(--olive-mid)}
    .proc-form textarea{min-height:110px;resize:vertical}
    .proc-form .btn-submit{margin-top:0.25rem}
    .proc-sent{display:none;color:var(--olive);font-size:15px;margin-top:0.75rem;font-family:var(--sans)}
    .proc-contact-details{margin-bottom:2rem}
    .proc-map-wrap{border-radius:var(--radius-lg);overflow:hidden;border:0.5px solid var(--border);margin-top:1.25rem}
    .proc-map-wrap iframe{width:100%;height:220px;border:none;display:block}
    @media(max-width:720px){
      .proc-body{grid-template-columns:1fr;gap:2.5rem;padding:2.5rem 1.25rem 4rem}
      .proc-hero{padding:3.5rem 1.25rem 3rem}
    }
  </style>

<script src="js/translations.js"></script>
<script>
let currentLang = 'en';
function detectLang() {
  try { var saved = localStorage.getItem('smb_lang'); if (saved && ['en','hu','ro'].includes(saved)) return saved; } catch(e) {}
  const langs = navigator.languages || [navigator.language || 'en'];
  for (const l of langs) { const c = l.slice(0,2).toLowerCase(); if(c==='hu') return 'hu'; if(c==='ro') return 'ro'; }
  return 'en';
}
function setLang(lang) {
  currentLang = lang;
  try { localStorage.setItem('smb_lang', lang); } catch(e) {}
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.querySelectorAll('[data-nav]').forEach(el => el.textContent = translations[lang].nav[el.dataset.nav] || '');
  const t = translations[lang];
  const op = t.operate;
  const ct = t.contact;
  // Hero
  document.getElementById('proc-eye').textContent = op.eyebrow;
  document.getElementById('proc-title').textContent = op.title;
  // Steps
  document.getElementById('proc-steps').innerHTML = op.steps.map((s,i) => `
    <div class="proc-step">
      <div class="proc-step-icon">${s.icon}</div>
      <div>
        <div class="proc-step-num">0${i+1}</div>
        <h3>${s.title}</h3>
        <p>${s.text}</p>
      </div>
    </div>`).join('');
  // Calculator links
  document.getElementById('proc-calc-prompt').textContent = op.calculatorPrompt;
  document.getElementById('proc-calc-links').innerHTML =
    op.calcLinks.map(l => `<a href="${l.href}" class="proc-calc-link">${l.label}</a>`).join('');
  // Contact details
  document.querySelector('.contact-phone').textContent = ct.phone;
  document.querySelector('.contact-email').textContent = ct.email;
  document.querySelector('.contact-location').textContent = ct.location;
  // Form
  const eyebrowParts = ct.eyebrow.split('\n');
  document.getElementById('proc-form-title').textContent = currentLang === 'hu' ? 'Visszahívást kérek!' : currentLang === 'ro' ? 'Solicit un apel!' : 'Request a callback!';
  document.querySelector('.fl-name').textContent = ct.fields.name;
  document.querySelector('.fl-phone').textContent = ct.fields.phone;
  document.querySelector('.fl-email').textContent = ct.fields.email;
  document.querySelector('.fl-msg').textContent = ct.fields.message;
  document.querySelector('.fl-send').textContent = ct.fields.send;
  document.getElementById('f-sent').textContent = ct.fields.sent;
  const termsText = document.querySelector('.fl-terms-text');
  const termsLink = document.querySelector('.fl-terms-link');
  if (termsText && ct.fields.termsText) termsText.textContent = ct.fields.termsText;
  if (termsLink && ct.fields.termsLink) { termsLink.textContent = ct.fields.termsLink; termsLink.href = ct.fields.termsUrl || 'privacy.html'; }
}

function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  let iframe = document.getElementById('_gf');
  if (!iframe) { iframe = document.createElement('iframe'); iframe.id='_gf'; iframe.name='_gf'; iframe.style.display='none'; document.body.appendChild(iframe); }
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = 'https://docs.google.com/forms/d/e/1FAIpQLSeGVlesIFUm-uIUY6xcyr6ORgWLeWA-ishxgBcZnhYBYRg2ow/formResponse';
  form.target = '_gf';
  const fields = {
    'entry.1806748632': name,
    'entry.73121990': document.getElementById('f-phone').value,
    'entry.1419449292': document.getElementById('f-email').value,
    'entry.313127878': document.getElementById('f-msg').value
  };
  Object.entries(fields).forEach(([k,v]) => {
    const i = document.createElement('input'); i.type='hidden'; i.name=k; i.value=v; form.appendChild(i);
  });
  document.body.appendChild(form); form.submit(); document.body.removeChild(form);
  var sentMsg = translations[currentLang] && translations[currentLang].contact && translations[currentLang].contact.fields.sent ? translations[currentLang].contact.fields.sent : 'Message sent!';
  alert(sentMsg);
  document.getElementById('f-sent').style.display = 'block';
  ['f-name','f-phone','f-email','f-msg'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  fetch('https://api.countapi.xyz/hit/supermalitabrothers.com/form_submit').catch(function(){});
}

document.addEventListener('DOMContentLoaded', () => setLang(detectLang()));
</script>
