<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Malita Brothers — Construction & Renovation, Szeged</title>
  <meta name="description" content="Premium construction, wall painting, drywall and tile installation in Szeged and surroundings. Licensed & insured." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── NAV ── -->
<nav class="nav">
  <div class="logo">Super <span>Malita</span> Brothers</div>
  <div class="nav-location">Szeged &amp; surroundings</div>
  <div class="nav-right">
    <div class="nav-links">
      <a href="#services" data-nav="services"></a>
      <a href="#about" data-nav="about"></a>
      <a href="#references" data-nav="references"></a>
      <a href="#contact" data-nav="contact"></a>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="hu" onclick="setLang('hu')">HU</button>
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="ro" onclick="setLang('ro')">RO</button>
    </div>
  </div>
</nav>

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-eyebrow"><span class="hero-eyebrow-text"></span></div>
  <h1 class="hero-h1"></h1>
  <p class="hero-sub"></p>
  <div class="hero-location-pill hero-location"></div>
</section>

<!-- ── STATS ── -->
<div class="stats">
  <div class="stat"><div class="stat-num"></div><div class="stat-label"></div><div class="stat-sub"></div></div>
  <div class="stat"><div class="stat-num"></div><div class="stat-label"></div><div class="stat-sub"></div></div>
  <div class="stat"><div class="stat-num"></div><div class="stat-label"></div><div class="stat-sub"></div></div>
</div>

<!-- ── BEST AT ── -->
<section class="section best-at">
  <div class="section-inner">
    <div class="section-eyebrow best-eyebrow"></div>
    <h2 class="section-title best-title"></h2>
    <div class="best-grid"></div>
  </div>
</section>

<!-- ── SERVICES ── -->
<section class="section services-section" id="services">
  <div class="section-inner">
    <div class="section-eyebrow services-eyebrow"></div>
    <h2 class="section-title services-title"></h2>
    <div class="services-grid"></div>
  </div>
</section>

<!-- ── ABOUT ── -->
<section class="section" id="about" style="background:#fff;">
  <div class="section-inner">
    <div class="gold-rule"></div>
    <div class="section-eyebrow about-eyebrow"></div>
    <h2 class="section-title about-title"></h2>
    <div class="about-grid">
      <div class="about-text">
        <p class="about-p1"></p>
        <p class="about-p2"></p>
        <p class="about-p3"></p>
        <p style="margin-top:1rem;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;" class="about-lang-label"></p>
        <div class="languages-row"></div>
      </div>
      <div class="brothers"></div>
    </div>
  </div>
</section>

<!-- ── PIXEL ART ── -->
<section class="mario-section">
  <div class="pixel-art-wrap">
    <div style="text-align:center;">
      <canvas id="mario-canvas" class="pixel"></canvas>
    </div>
    <div style="text-align:center;">
      <canvas id="luigi-canvas" class="pixel"></canvas>
    </div>
  </div>
</section>

<!-- ── REFERENCES ── -->
<section class="section references-section" id="references">
  <div class="section-inner">
    <div class="section-eyebrow refs-eyebrow"></div>
    <h2 class="section-title refs-title"></h2>
    <div class="slider-wrap">
      <div class="slider-track"></div>
      <div class="slider-arrows">
        <button class="slider-arrow" onclick="prevSlide()">&#8592;</button>
        <button class="slider-arrow" onclick="nextSlide()">&#8594;</button>
      </div>
    </div>
    <div class="slider-nav"></div>
  </div>
</section>

<!-- ── BOOKING ── -->
<section class="section booking-section" id="booking">
  <div class="section-inner">
    <div class="section-eyebrow booking-eyebrow"></div>
    <h2 class="section-title booking-title"></h2>
    <p class="booking-sub"></p>
    <div class="calendar-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">&#8592;</button>
        <span class="cal-month-label" id="cal-month-label"></span>
        <button class="cal-nav" onclick="calNext()">&#8594;</button>
      </div>
      <div class="cal-weekdays">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-legend">
        <span class="leg-item"><span class="leg-dot leg-available"></span><span class="leg-txt-available"></span></span>
        <span class="leg-item"><span class="leg-dot leg-blocked"></span><span class="leg-txt-blocked"></span></span>
        <span class="leg-item"><span class="leg-dot leg-selected"></span><span class="leg-txt-selected"></span></span>
      </div>
    </div>
    <div class="booking-form" id="booking-form" style="display:none;">
      <div class="booking-selected-date" id="booking-selected-date"></div>
      <div class="form-group"><label class="bk-label-name"></label><input type="text" id="bk-name" /></div>
      <div class="form-group"><label class="bk-label-phone"></label><input type="text" id="bk-phone" /></div>
      <div class="form-group"><label class="bk-label-note"></label><textarea id="bk-note" style="min-height:80px;resize:vertical;"></textarea></div>
      <button class="btn-submit bk-send-btn" onclick="submitBooking()"></button>
      <div class="bk-sent" id="bk-sent" style="display:none;"></div>
    </div>
  </div>
</section>

<!-- ── STICKER ── -->
<div class="sticker-popup" id="sticker-popup" onclick="document.getElementById('booking').scrollIntoView({behavior:'smooth'})">
  <div class="sticker-inner">
    <div class="sticker-star">★</div>
    <div class="sticker-text bk-sticker-txt"></div>
    <div class="sticker-cta bk-sticker-cta"></div>
  </div>
  <button class="sticker-close" onclick="event.stopPropagation();document.getElementById('sticker-popup').style.display='none'">✕</button>
</div>

<!-- ── CONTACT ── -->
<section class="section contact-section" id="contact">
  <div class="section-inner">
    <div class="contact-grid">
      <div class="contact-info">
        <div class="section-eyebrow contact-eyebrow"></div>
        <h2 class="section-title contact-title"></h2>
        <div class="contact-detail">
          <div class="contact-icon">📞</div>
          <div><strong class="contact-phone"></strong></div>
        </div>
        <div class="contact-detail">
          <div class="contact-icon">✉️</div>
          <div><strong class="contact-email"></strong></div>
        </div>
        <div class="contact-detail">
          <div class="contact-icon">📍</div>
          <div><strong class="contact-location"></strong></div>
        </div>
      </div>
      <div>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="f-name" />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="f-phone" />
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea id="f-msg"></textarea>
        </div>
        <div class="form-group">
          <label class="file-upload-label">
            <span></span>
            <input type="file" multiple accept="image/*,.pdf" onchange="fileChosen(this)" />
          </label>
          <div class="file-hint"></div>
        </div>
        <button class="btn-submit t-send" onclick="submitForm()"></button>
        <div class="t-sent sent-msg"></div>
      </div>
    </div>
  </div>
</section>

<!-- ── FOOTER ── -->
<footer>
  <div class="footer-logo">Super <span>Malita</span> Brothers</div>
  <p>Szeged &amp; surroundings · 123 · abc@abc.com</p>
  <p>© 2026 Super Malita Brothers</p>
</footer>

<script src="js/translations.js"></script>
<script src="js/main.js"></script>
</body>
</html>
