  <!-- CountAPI — visitor & interaction tracking -->
  <!-- Available CountAPI calls used here:
       1. /hit/:namespace/:key — increments a counter each page load (total visits)
       2. /hit/:namespace/:key — per-page hit counter (by path)
       3. /hit/:namespace/:key — language usage tracking
       4. /get/:namespace/:key — read a counter value without incrementing
       5. /set/:namespace/:key/:value — set a counter to a specific value
       6. /info/:namespace/:key — get metadata (created, value, namespace, key)
       7. /create?key=&namespace=&value=&enable_reset=&is_private= — create new counter
       CountAPI docs: https://countapi.xyz
  -->
  <script>
  (function trackVisit() {
    // 1. Global visit counter
    fetch('https://api.countapi.xyz/hit/supermalitabrothers.com/visits').catch(function(){});
    // 2. Per-page counter
    var page = location.pathname.split('/').pop().replace('.html','') || 'home';
    fetch('https://api.countapi.xyz/hit/supermalitabrothers.com/page_' + page).catch(function(){});
    // 3. Language preference counter
    var lang = (navigator.language || 'en').slice(0,2);
    fetch('https://api.countapi.xyz/hit/supermalitabrothers.com/lang_' + lang).catch(function(){});
    // 4. Device type counter
    var device = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
    fetch('https://api.countapi.xyz/hit/supermalitabrothers.com/device_' + device).catch(function(){});
  })();
  </script>
