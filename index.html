<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Malita Brothers — Construction & Renovation, Szeged</title>
  <meta name="description" content="Premium construction, wall painting, drywall and tile installation in Szeged and surroundings. Licensed & insured." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">Super <span>Malita</span> Brothers</div>
  <div class="nav-right">
    <div class="nav-links">
      <a href="#services" data-nav="services"></a>
      <a href="#about" data-nav="about"></a>
      <a href="#references" data-nav="references"></a>
      <a href="#contact" data-nav="contact"></a>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="hu" onclick="setLang('hu')">HU</button>
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="ro" onclick="setLang('ro')">RO</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow"><span class="hero-eyebrow-text"></span></div>
  <h1 class="hero-h1"></h1>
  <p class="hero-sub"></p>
</section>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-num"></div><div class="stat-label"></div><div class="stat-sub"></div></div>
  <div class="stat"><div class="stat-num"></div><div class="stat-label"></div><div class="stat-sub"></div></div>
  <div class="stat"><div class="stat-num"></div><div class="stat-label"></div><div class="stat-sub"></div></div>
</div>

<!-- BEST AT -->
<section class="section best-at">
  <div class="section-inner">
    <div class="section-eyebrow best-eyebrow"></div>
    <div class="best-grid"></div>
  </div>
</section>

<!-- SERVICES -->
<section class="section services-section" id="services">
  <div class="section-inner">
    <div class="section-eyebrow services-eyebrow"></div>
    <p class="services-sub"></p>
    <div class="services-grid"></div>
  </div>
</section>

<!-- ABOUT -->
<section class="section" id="about" style="background:#fff;">
  <div class="section-inner">
    <div class="section-eyebrow about-eyebrow"></div>
    <h2 class="section-title about-title"></h2>
    <div class="about-grid">
      <div class="about-text">
        <p class="about-p1"></p>
        <p class="about-p2"></p>
        <p class="about-p3"></p>
        <p style="margin-top:1rem;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;" class="about-lang-label"></p>
        <div class="languages-row"></div>
      </div>
      <div class="brothers"></div>
    </div>
  </div>
</section>

<!-- REFERENCES -->
<section class="section references-section" id="references">
  <div class="section-inner">
    <div class="section-eyebrow refs-eyebrow"></div>
    <div class="refs-grid" id="refs-grid"></div>
  </div>
</section>

<!-- CHECK THIS OUT -->
<section class="section checkthis-section" id="checkthis">
  <div class="section-inner">
    <div class="section-eyebrow checkthis-eyebrow"></div>
    <h2 class="section-title checkthis-title"></h2>
    <div class="flip-grid">
      <div class="flip-card"><div class="flip-inner"><div class="flip-front" style="background-image:url('images/render1.jpg')"></div><div class="flip-back" style="background-image:url('images/real1.jpg')"></div></div></div>
      <div class="flip-card"><div class="flip-inner"><div class="flip-front" style="background-image:url('images/render2.jpg')"></div><div class="flip-back" style="background-image:url('images/real2.jpg')"></div></div></div>
      <div class="flip-card"><div class="flip-inner"><div class="flip-front" style="background-image:url('images/render3.jpg')"></div><div class="flip-back" style="background-image:url('images/real3.jpg')"></div></div></div>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section class="section contact-section" id="contact">
  <div class="section-inner">
    <div class="contact-grid">
      <div class="contact-info">
        <div class="section-eyebrow contact-eyebrow"></div>
        <div class="contact-detail"><div class="contact-icon">&#128222;</div><div><strong class="contact-phone"></strong></div></div>
        <div class="contact-detail"><div class="contact-icon">&#9993;&#65039;</div><div><strong class="contact-email"></strong></div></div>
        <div class="contact-detail"><div class="contact-icon">&#128205;</div><div><strong class="contact-location"></strong></div></div>
        <div class="map-wrap">
          <iframe class="szeged-map" src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d190000!2d20.1486!3d46.253!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2shu!4v1" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Szeged service area"></iframe>
        </div>
      </div>
      <div>
        <div class="form-group"><label class="fl-name"></label><input type="text" id="f-name" /></div>
        <div class="form-group"><label class="fl-phone"></label><input type="text" id="f-phone" /></div>
        <div class="form-group"><label class="fl-email"></label><input type="email" id="f-email" /></div>
        <div class="form-group"><label class="fl-msg"></label><textarea id="f-msg"></textarea></div>
        <div class="form-group">
          <label class="file-upload-label"><span class="fl-file"></span><input type="file" id="f-photos" multiple accept="image/*,.pdf" onchange="fileChosen(this)" /></label>
          <div class="file-hint fl-hint"></div>
        </div>
        <button class="btn-submit fl-send" onclick="submitForm()"></button>
        <div class="t-sent sent-msg" id="f-sent"></div>
      </div>
    </div>
  </div>
</section>

<!-- PIXEL ART at bottom -->
<section class="mario-section">
  <div class="pixel-art-wrap">
    <div style="text-align:center;"><canvas id="mario-canvas" class="pixel"></canvas><div class="pixel-label">Malita Alex</div></div>
    <div style="text-align:center;"><canvas id="luigi-canvas" class="pixel"></canvas><div class="pixel-label">Malita Sergiu</div></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">Super <span>Malita</span> Brothers</div>
  <p>Szeged &amp; surroundings &middot; 123 &middot; abc@abc.com</p>
  <p>&copy; 2026 Super Malita Brothers</p>
</footer>

<!-- STICKER -->
<div class="sticker-popup" id="sticker-popup" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">
  <div class="sticker-inner">
    <div class="sticker-star">&#9733;</div>
    <div class="sticker-text bk-sticker-txt"></div>
    <div class="sticker-cta bk-sticker-cta"></div>
  </div>
  <button class="sticker-close" onclick="event.stopPropagation();document.getElementById('sticker-popup').style.display='none'">&#10005;</button>
</div>

<script src="js/translations.js"></script>
<script src="js/main.js"></script>
</body>
</html>
