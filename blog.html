<script>
// Blog index: show cards linking to subpages
const _blogIndexOrig = window.renderBlog;
window.renderBlog = function(t) {
  document.querySelectorAll('[data-nav]').forEach(el => el.textContent = t.nav[el.dataset.nav] || '');
  document.querySelector('.blog-eyebrow').textContent = t.blog.eyebrow;
  document.querySelector('.blog-hero-title').textContent = t.blog.title;
  const slugs = ['burkolas-szeged','szobafesto-szeged','burkolasarak-szeged'];
  const icons = ['🧩','🎨','💰'];
  const readMore = currentLang === 'hu' ? 'Tovább olvasom' : currentLang === 'ro' ? 'Citește mai mult' : 'Read more';
  const idx = document.getElementById('blog-index');
  if (!idx) return;
  idx.innerHTML = t.blog.posts.map((p, i) => `
    <a href="blog/${slugs[i]}.html" class="blog-card">
      <div class="blog-card-img">${icons[i]}</div>
      <div class="blog-card-body">
        <h2 class="blog-card-title">${p.title}</h2>
        <p class="blog-card-intro">${p.intro}</p>
        <span class="blog-card-cta">${readMore} &rarr;</span>
      </div>
    </a>`).join('');
};
</script>
